<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with rounded corners (iOS will mask, Android maskable target is the inner 80%) -->
  <rect width="512" height="512" rx="96" fill="#0d1117"/>

  <!-- Subtle grid -->
  <g stroke="#1a212c" stroke-width="2" fill="none">
    <path d="M0 128 H512 M0 256 H512 M0 384 H512"/>
    <path d="M128 0 V512 M256 0 V512 M384 0 V512"/>
  </g>

  <!-- Refractive medium box -->
  <rect x="160" y="160" width="192" height="192" rx="8"
        fill="rgba(120,160,210,0.30)" stroke="#79a6d2" stroke-width="6"/>

  <!-- Ray, refracted through the box.
       Enters at left face, bends towards normal inside, exits bent back out.
       Three line segments make the polyline.  -->
  <g stroke="#ffeb3b" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="32,96 160,224 352,320 480,360"/>
  </g>

  <!-- Ray origin marker -->
  <circle cx="32" cy="96" r="18" fill="#ffeb3b" stroke="#000" stroke-width="4"/>

  <!-- Hit points where the ray crosses the boundaries (visual hint of refraction) -->
  <circle cx="160" cy="224" r="10" fill="#ffeb3b" stroke="#0d1117" stroke-width="3"/>
  <circle cx="352" cy="320" r="10" fill="#ffeb3b" stroke="#0d1117" stroke-width="3"/>
</svg>
