<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2D Ray Tracer</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0d1117">

<!-- iOS: needs its own tags (doesn't honour the manifest fully) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RayTracer">
<link rel="apple-touch-icon" href="icons/icon-180.png">

<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <div id="toolbar">
    <div class="tool-row">
      <button id="btnAddBox" class="tool-btn">+ Box</button>
      <button id="btnAddKill" class="tool-btn">+ Kill</button>
      <button id="btnDeleteBox" class="tool-btn" disabled>Delete</button>
      <button id="btnReset" class="tool-btn">Reset</button>
    </div>

    <div class="tool-row sel-row" id="selPanel" hidden>
      <label>n = <input type="number" id="selN" min="1.0" max="4.0" step="0.01" value="1.50"></label>
      <input type="range" id="selNRange" min="1.0" max="4.0" step="0.01" value="1.50">
    </div>

    <div class="tool-row info-row">
      <span id="rayInfo">Ray: drag the yellow dot to move, the arrow tip to aim</span>
    </div>
  </div>

  <div id="canvasWrap">
    <canvas id="canvas"></canvas>
    <button id="fitBtn">Fit</button>
    <div id="zoomBadge">100%</div>
  </div>

</div>

<script src="app.js"></script>

<script>
// Service worker policy.
//
// We only want a service worker when the app is being served from a real
// HTTPS host (e.g. GitHub Pages), because that's when it provides offline
// support and makes the app installable as a PWA.
//
// When the app runs from localhost, file://, or inside an editor's webview
// (Spck, etc.), an active service worker can intercept fetches against the
// wrong origin and stall the whole app. So in those environments we both
// skip registration AND aggressively unregister any worker that's already
// installed, plus delete its caches.
if ('serviceWorker' in navigator) {
  const host = location.hostname;
  const isHttpsHost =
    location.protocol === 'https:' &&
    host !== 'localhost' &&
    host !== '127.0.0.1' &&
    host !== '0.0.0.0';

  window.addEventListener('load', async () => {
    if (isHttpsHost) {
      // Real deployment — register normally.
      try {
        await navigator.serviceWorker.register('sw.js');
      } catch (err) {
        console.warn('SW registration failed:', err);
      }
    } else {
      // Local / editor preview — make sure no stale SW is hijacking requests.
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) await r.unregister();
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }
      } catch (err) {
        console.warn('SW cleanup failed:', err);
      }
    }
  });
}
</script>
</body>
</html>
